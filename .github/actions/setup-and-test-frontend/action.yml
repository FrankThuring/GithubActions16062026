name: Setup and test frontend
description: Install deps, typecheck and run vitest for the frontend-app

inputs:
  node-version:
    description: Node.js version to use
    required: false
    default: "20"
  working-directory:
    description: Path to the frontend-app project
    required: false
    default: Github_Copilot_Actions-main/labs/frontend-app

runs:
  using: composite
  steps:
    - name: Setup Node ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

    - name: Install
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci

    - name: Lint (typecheck)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm run lint

    - name: Test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm test
