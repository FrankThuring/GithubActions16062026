name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'Github_Copilot_Actions-main/labs/**'
      - '.github/workflows/frontend-ci.yml'
      - '.github/actions/setup-and-test-frontend/**'
      - '.github/actions/changelog-check/**'
  pull_request:
    paths:
      - 'Github_Copilot_Actions-main/labs/**'
      - '.github/workflows/frontend-ci.yml'
      - '.github/actions/setup-and-test-frontend/**'
      - '.github/actions/changelog-check/**'
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    defaults:
      run:
        working-directory: Github_Copilot_Actions-main/labs/frontend-app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup and test (composite)
        uses: ./.github/actions/setup-and-test-frontend
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Github_Copilot_Actions-main/labs/frontend-app/dist
          if-no-files-found: error

  inspect:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: List artifact contents
        run: ls -la dist

  changelog:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md was updated
        uses: ./.github/actions/changelog-check
